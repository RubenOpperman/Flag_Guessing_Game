<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flag Game</title>
    <link href="../output.css" rel="stylesheet" />
    <script type="module" async src="./scripts/main.js"></script>
  </head>

  <body class="w-full h-full bg-red-500">
    <section class="w-full bg-black p-10 flex justify-evenly">
      <div class="text-3xl text-red-500">
        <p>High Score:</p>
        <p id="High_Score_Container"></p>
      </div>
      <div class="text-3xl text-red-500">WELCOME TO THE FLAG GAME!!</div>
      <div id="score_container" class="text-3xl flex text-red-500">
        <p>Score:</p>
        <p id="Score_Container"></p>
      </div>
    </section>

    <section
      class="mx-auto w-[30%] h-full my-5 bg-white flex p-5 flex-col items-center justify-center shadow-3xl rounded-xl"
    >
      <div
        id="imageContainer"
        class="w-auto h-50 flex justify-center object-fit shadow-xl"
      ></div>
      <div id="buttonContainer" class="flex-col p-5"></div>
      <button
        id="btn_change_flag"
        class="text-3lg font-bold py-2 px-4 border-2 rounded-lg hidden"
      >
        Change flag
      </button>
    </section>
  </body>
</html>
