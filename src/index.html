<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flag Game</title>
    <link href="../output.css" rel="stylesheet" />
    <script type="module" async src="./scripts/main.js"></script>
  </head>

  <body
    class="w-full bg-[url('../images/Whole_world_-_land_and_oceans.jpg')] bg-cover bg-top bg-bottom bg-center bg-fixed"
  >
    <section class="w-full bg-[#0F172A] text-[#38BDF8] p-5 flex justify-evenly">
      <div class="text-3xl flex gap-2">
        <p class="text-[#F8FAFC]">High Score :</p>
        <p class="text-[red]" id="High_Score_Container"></p>
      </div>
      <div class="text-3xl">WELCOME TO THE FLAG GAME!!</div>
      <div id="score_container" class="text-3xl gap-2 flex">
        <p class="text-[#F8FAFC]">Score :</p>
        <p class="text-green-400" id="Score_Container"></p>
      </div>
    </section>

    <section
      class="mx-auto w-[30%] h-full my-5 bg-[#1E293B] flex p-5 flex-col items-center justify-center shadow-3xl rounded-xl"
    >
      <div
        id="imageContainer"
        class="w-auto h-50 flex justify-center object-fit shadow-xl"
      ></div>
      <div id="buttonContainer" class="flex-col p-5"></div>
      <button
        id="btn_change_flag"
        class="text-lg text-[#0F172A] font-bold py-2 px-4 border-2 block rounded-lg hidden bg-[#38BDF8] hover:bg-[#0EA5E9] text-bold"
      >
        Next Flag
      </button>
    </section>
  </body>
</html>
